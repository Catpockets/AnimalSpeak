<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Animal Speak</title>

<!-- App / browser icons -->
<link rel="icon" type="image/png" sizes="32x32" href="./assets/jellyfish-icon.png?v=2">
<link rel="icon" type="image/png" sizes="192x192" href="./assets/jellyfish-icon.png?v=2">
<link rel="shortcut icon" type="image/png" href="./assets/jellyfish-icon.png?v=2">

<!-- iPad / iPhone home screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="./assets/jellyfish-icon.png?v=2">

<!-- Android / general web app icon -->
<link rel="manifest" href="./manifest.json?v=2">
<meta name="theme-color" content="#8edbd2">

<!-- v6: birds world, mega reef, blue whale -->
<style>
  /* ============================================================
     Animal Speak — a gentle naming & matching game
     Designed to be calm, predictable, and joyful.
     No reading required. No failure. No time pressure.
     ============================================================ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%; overflow:hidden;
    touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
    font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", rounded, sans-serif;
  }
  body {
    background: linear-gradient(180deg, #BFE3F2 0%, #E8F6E8 100%);
    transition: background 1.2s ease;
  }

  /* ---------- screens ---------- */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* ---------- decorative background layer ---------- */
  #bgScenery { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  #bgScenery svg { position:absolute; }
  .float-slow { animation: floaty 7s ease-in-out infinite; }
  .float-slower { animation: floaty 11s ease-in-out infinite; }
  @keyframes floaty { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-14px);} }

  /* ---------- home screen ---------- */
  #home { justify-content:center; gap:2.5vmin; z-index:1; }
  #gameTitle { text-align:center; }
  #gameTitle h1 {
    font-size:8vmin; color:#5B4632;
    text-shadow: 0 3px 0 rgba(255,255,255,.7);
    letter-spacing:.5px;
  }
  #gameTitle .subtitle { font-size:3.2vmin; color:#8A7257; margin-top:.5vmin; }
  #worldDoors { display:flex; gap:4vmin; margin-top:2vmin; flex-wrap:wrap; justify-content:center; }
  .door {
    width:26vmin; height:32vmin; border:none; cursor:pointer;
    border-radius:4vmin; padding:2vmin 1vmin 1.5vmin;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1vmin;
    box-shadow: 0 8px 0 rgba(0,0,0,.12), 0 12px 24px rgba(0,0,0,.10);
    transition: transform .18s ease;
    animation: doorBob 4s ease-in-out infinite;
  }
  .door:nth-child(2){ animation-delay:1.3s; }
  .door:nth-child(3){ animation-delay:2.6s; }
  @keyframes doorBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .door:active { transform:scale(.94); animation:none; }
  .door svg { width:17vmin; height:17vmin; }
  .door .doorLabel { font-size:3.4vmin; font-weight:bold; color:rgba(70,50,30,.85); }
  #door-safari { background: linear-gradient(180deg,#FFD98A,#F5B14F); }
  #door-birds  { background: linear-gradient(180deg,#B8E2F8,#7FC4EC); }

  #homeStickerBtn {
    margin-top:1.5vmin; border:none; cursor:pointer;
    background:linear-gradient(180deg,#FFF3C9,#FFE08A);
    border-radius:6vmin; padding:1.6vmin 4vmin;
    display:flex; align-items:center; gap:1.5vmin;
    font-size:3.2vmin; font-weight:bold; color:#7A5A20;
    box-shadow:0 5px 0 rgba(0,0,0,.12);
    font-family:inherit;
  }
  #homeStickerBtn:active{ transform:scale(.94); }
  #homeStickerBtn svg{ width:5vmin; height:5vmin; }

  /* ---------- top bar (game + sticker screens) ---------- */
  .topbar {
    width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:2vmin 2.5vmin 0; z-index:5;
  }
  .roundBtn {
    width:9.5vmin; height:9.5vmin; min-width:52px; min-height:52px;
    border:none; border-radius:50%; cursor:pointer;
    background:rgba(255,255,255,.85);
    box-shadow:0 4px 0 rgba(0,0,0,.12);
    display:flex; align-items:center; justify-content:center;
  }
  .roundBtn:active{ transform:scale(.92); }
  .roundBtn svg{ width:55%; height:55%; }

  /* ---------- bird world ---------- */
  body.world-birds { background: linear-gradient(180deg,#8EC8F2 0%, #B8E0F8 60%, #D8F0E0 100%); }
  #birdScene .topbar { position:relative; z-index:60; }
  #aviary { position:absolute; inset:0; overflow:hidden; }
  .grassB  { position:absolute; bottom:0; left:-5%; width:110%; height:18%; background:#7FB85E; border-radius:50% 50% 0 0 / 30% 30% 0 0; }
  .grassB2 { position:absolute; bottom:0; left:-5%; width:110%; height:10%; background:#6FA84E; border-radius:50% 50% 0 0 / 40% 40% 0 0; }
  #aviaryDecor svg { position:absolute; pointer-events:none; }
  #birdLayer { position:absolute; inset:0; pointer-events:none; }
  .birdEl { position:absolute; left:0; top:0; will-change:transform; cursor:pointer; pointer-events:auto; }
  .birdEl .inner { width:100%; height:100%; }
  .birdEl svg { width:100%; height:100%; display:block; pointer-events:none; }
  #birdFx { position:absolute; inset:0; pointer-events:none; z-index:30; }
  .hwings { animation: flutterA .14s linear infinite alternate; transform-box:fill-box; transform-origin:center; }
  .fwing { animation: flapW .45s ease-in-out infinite alternate; transform-box:fill-box; transform-origin:15% 100%; }
  @keyframes flapW { from{transform:rotate(4deg)} to{transform:rotate(-38deg)} }
  .fishP { position:absolute; animation: fishA 1.3s ease forwards; }
  .fishP svg { width:100%; height:100%; }
  @keyframes fishA { 0%{transform:translateY(5vmin) rotate(0); opacity:0} 25%{opacity:1} 100%{transform:translate(1vmin,-6vmin) rotate(-50deg); opacity:0} }
  @keyframes flutterA { from{transform:scaleY(1)} to{transform:scaleY(.45)} }
  .inner.soar { animation: soarA 1.5s ease; }
  @keyframes soarA { 0%,100%{transform:translateY(0)} 35%{transform:translateY(-48%) rotate(-8deg)} 65%{transform:translateY(-34%) rotate(-4deg)} }
  .inner.hopB { animation: hopA 1s ease; }
  @keyframes hopA { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-22%)} 50%{transform:translateY(0)} 75%{transform:translateY(-14%)} }
  .inner.peck { animation: peckA .9s ease; transform-origin:30% 70%; }
  @keyframes peckA { 0%,100%{transform:rotate(0)} 25%{transform:rotate(22deg)} 45%{transform:rotate(0)} 70%{transform:rotate(22deg)} }
  .inner.drum { animation: drumA 1s linear; }
  @keyframes drumA { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-7px)} 20%,40%,60%,80%{transform:translateX(0)} }
  .inner.hoo { animation: hooA 1.2s ease; }
  @keyframes hooA { 0%,100%{transform:scale(1)} 30%{transform:scale(1.1)} 60%{transform:scale(1.04)} }
  .eggP { position:absolute; width:3vmin; height:3.8vmin; background:#F8F2E2; border:1px solid #E0D8C0; border-radius:50%; animation: eggA 2.6s ease forwards; }
  @keyframes eggA { 0%{transform:translateY(0); opacity:1} 18%{transform:translateY(4.5vmin)} 80%{transform:translateY(4.5vmin); opacity:1} 100%{transform:translateY(4.5vmin); opacity:0} }
  .noteP { position:absolute; animation: noteA 1.4s ease-out forwards; }
  .noteP svg { width:100%; height:100%; }
  @keyframes noteA { 0%{transform:translate(0,0) scale(.6); opacity:1} 100%{transform:translate(var(--dx),-12vmin) scale(1.1); opacity:0} }
  .featherP { position:absolute; animation: featherA 3.2s ease-in forwards; }
  .featherP svg { width:100%; height:100%; }
  @keyframes featherA { 0%{transform:translate(0,0) rotate(0)} 25%{transform:translate(-3vmin,8vh) rotate(-30deg)} 50%{transform:translate(2vmin,16vh) rotate(20deg)} 75%{transform:translate(-2vmin,24vh) rotate(-25deg)} 100%{transform:translate(2vmin,34vh) rotate(15deg); opacity:0} }
  .chipP { position:absolute; width:1.4vmin; height:1vmin; background:#C9A06A; border-radius:30%; animation: leafFly .8s ease-out forwards; }

  /* ---------- reef interactives ---------- */
  .inner.pulseBig { animation: pulseBigA .9s ease; }
  @keyframes pulseBigA { 0%,100%{transform:scale(1)} 40%{transform:scale(1.28)} }
  .hcBody { transition:transform .35s ease; transform-box:fill-box; transform-origin:center; }
  .inner.hideIn .hcBody { transform:translate(24px,6px) scale(.15); }
  .eelGroup { transition:transform .4s ease; }
  .inner.eelsDown .eelGroup { transform:translateY(95px); }
  .lidTop { transition:transform .45s ease; transform-box:fill-box; transform-origin:88% 100%; }
  .inner.chestOpen .lidTop { transform:rotate(26deg); }
  .coinP { position:absolute; border-radius:50%; background:#F2C14E; border:2px solid #D9A32E; animation: dropArc 1.1s ease-out forwards; }

  /* ---------- celebration ---------- */
  #celebrationLayer { position:absolute; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
  .star-burst {
    position:absolute; width:6vmin; height:6vmin;
    animation: starFly 1.4s ease-out forwards;
  }
  @keyframes starFly {
    0% { transform: translate(0,0) scale(.4) rotate(0deg); opacity:1; }
    70%{ opacity:1; }
    100%{ transform: translate(var(--dx), var(--dy)) scale(1.1) rotate(var(--rot)); opacity:0; }
  }
  .confettiBit {
    position:absolute; width:2.2vmin; height:3vmin; border-radius:.6vmin;
    animation: confFall 2.4s ease-in forwards;
  }
  @keyframes confFall {
    0%{ transform:translateY(-5vh) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(720deg); opacity:.6; }
  }
  #bigPraise {
    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%) scale(0);
    z-index:60; pointer-events:none;
  }
  #bigPraise.show { animation: praisePop 1.8s ease forwards; }
  @keyframes praisePop {
    0%{ transform:translate(-50%,-50%) scale(0); }
    35%{ transform:translate(-50%,-50%) scale(1.15); }
    55%{ transform:translate(-50%,-50%) scale(1); }
    85%{ transform:translate(-50%,-50%) scale(1); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1.2); opacity:0; }
  }
  #bigPraise svg { width:34vmin; height:18vmin; }

  /* ---------- talk board (AAC) ---------- */
  #stickers { z-index:1; }
  #stickerTitle { font-size:5vmin; color:#5B4632; margin:1vmin 0 0; text-shadow:0 2px 0 rgba(255,255,255,.6); }
  #stickerGrid {
    flex:1; width:100%; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:flex; flex-direction:column; gap:2.2vmin; padding:2.5vmin 3.5vmin 5vmin;
  }
  .phraseRow { display:grid; grid-template-columns:repeat(auto-fill, minmax(15vmin, 1fr)); gap:2vmin; }
  .animalRow { display:grid; grid-template-columns:repeat(auto-fill, minmax(16vmin, 1fr)); gap:2.2vmin; }
  .talkDivider { height:.7vmin; background:rgba(255,255,255,.55); border-radius:1vmin; }
  .talkTile {
    border:none; cursor:pointer; border-radius:3.5vmin; aspect-ratio:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.5vmin; padding:1.2vmin; box-shadow:0 4px 0 rgba(0,0,0,.10); font-family:inherit;
  }
  .talkTile svg { width:64%; height:64%; }
  .talkTile .tLabel { font-size:2vmin; font-weight:bold; color:rgba(60,45,25,.72); }
  .talkTile:active { transform:scale(.92); }
  .talkTile.saying { animation:tilePop .45s ease; }
  @keyframes tilePop { 0%{transform:scale(1)} 40%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .animalTile { background:rgba(255,255,255,.92); }

  /* ---------- safari hide & seek ---------- */
  body.world-safariS { background: linear-gradient(180deg,#9ED9F0 0%, #CFEFF8 55%, #F2E2B0 100%); }
  body.world-safariS.gold { background: linear-gradient(180deg,#FFB877 0%, #FFD9A0 55%, #F2D898 100%); }
  #safariScene .topbar { position:relative; z-index:80; }
  #savanna { position:absolute; inset:0; overflow:hidden; }
  .skyItem { position:absolute; pointer-events:none; }
  .ground2 { position:absolute; bottom:0; left:-6%; width:112%; height:36%; background:#CBB877; border-radius:50% 50% 0 0 / 26% 26% 0 0; }
  .ground  { position:absolute; bottom:0; left:-6%; width:112%; height:27%; background:#E0CA86; border-radius:50% 50% 0 0 / 30% 30% 0 0; }
  .riverBand { position:absolute; bottom:0; left:0; width:100%; height:14%;
    background:linear-gradient(180deg,#6FBFE8,#4E9AD0); }
  .spot { position:absolute; }
  .spot .animalEl { position:absolute; left:50%; bottom:30%; width:92%; aspect-ratio:1;
    opacity:0; transform:translate(-50%,35%) scale(.4); pointer-events:none;
    transition: transform .55s cubic-bezier(.34,1.56,.64,1), opacity .3s ease; }
  .spot.revealed .animalEl { opacity:1; transform:translate(-50%,-80%) scale(1); }
  .spot .animalEl svg { width:100%; height:100%; }
  .spot .obstacleEl { position:relative; width:100%; height:100%; cursor:pointer; }
  .spot .obstacleEl svg { width:100%; height:100%; display:block; pointer-events:none; }
  .obstacleEl.rustle { animation: rustleA .5s ease; transform-origin:50% 90%; }
  @keyframes rustleA { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 50%{transform:rotate(3deg)} 75%{transform:rotate(-2deg)} }
  .leafP { position:absolute; width:1.8vmin; height:1.1vmin; background:#6FAE5C;
    border-radius:50% 50% 50% 0; animation: leafFly .9s ease-out forwards; pointer-events:none; }
  @keyframes leafFly { to { transform:translate(var(--dx),var(--dy)) rotate(220deg); opacity:0; } }
  .butterflyP { position:absolute; width:6vmin; height:6vmin; animation: flyAway 2.4s ease-in forwards; pointer-events:none; }
  .butterflyP svg { width:100%; height:100%; }
  @keyframes flyAway {
    0%{ transform:translate(0,0); } 25%{ transform:translate(4vmin,-9vmin) rotate(12deg); }
    50%{ transform:translate(-2vmin,-18vmin) rotate(-10deg); } 100%{ transform:translate(6vmin,-36vmin) rotate(8deg); opacity:0; }
  }

  /* ---------- aquarium ---------- */
  body.world-aqua { background: linear-gradient(180deg,#8ED6F2 0%, #4AA3DC 55%, #2470A8 100%); }
  #door-aqua { background: linear-gradient(180deg,#A8E8E0,#5FC9BC); }
  #aqua .topbar { position:relative; z-index:6; }
  #tank { position:absolute; inset:0; overflow:hidden; }
  .lightray { position:absolute; top:-12%; width:16vmin; height:78%; pointer-events:none;
    background:linear-gradient(180deg, rgba(255,255,255,.30), rgba(255,255,255,0));
    transform:skewX(-13deg); animation:rayShift 9s ease-in-out infinite; }
  @keyframes rayShift { 0%,100%{opacity:.45} 50%{opacity:.95} }
  .sand  { position:absolute; bottom:0; left:-4%; width:108%; height:11%; pointer-events:none;
    background:#EAD79F; border-radius:50% 50% 0 0 / 70% 70% 0 0; height:13%; }
  .sand2 { position:absolute; bottom:0; left:-4%; width:108%; height:5%; pointer-events:none;
    background:#DFC98B; border-radius:50% 50% 0 0 / 80% 80% 0 0; height:6%; }
  #tankDecor svg { position:absolute; pointer-events:none; }
  .sway { transform-origin:50% 100%; animation:swayA 5.5s ease-in-out infinite alternate; }
  @keyframes swayA { from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }
  #tankCreatures { position:absolute; inset:0; pointer-events:none; }
  .swimmer { position:absolute; left:0; top:0; will-change:transform; cursor:pointer; pointer-events:auto; }
  .swimmer .inner { width:100%; height:100%; }
  .swimmer svg { width:100%; height:100%; display:block; pointer-events:none; }
  .inner.jelly { animation: jellyPulse 2.6s ease-in-out infinite; transform-origin:50% 25%; }
  @keyframes jellyPulse { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(.92) scaleX(1.05)} }
  .inner.spin { animation: spinA 1s ease; }
  @keyframes spinA { to { transform:rotate(-360deg); } }
  .inner.shockFlash { animation: shockA .9s linear; }
  @keyframes shockA { 0%,100%{filter:none} 15%,45%,75%{filter:brightness(2.2) saturate(.4)} 30%,60%,90%{filter:brightness(1.1)} }
  .inner.wiggle { animation: wiggleA .9s ease; }
  @keyframes wiggleA { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .inner.chomp { animation: chompA .9s ease; }
  @keyframes chompA { 0%,100%{transform:none} 22%{transform:translateX(-16px) rotate(-9deg) scale(1.1)} 45%{transform:rotate(4deg)} 70%{transform:translateX(-10px) rotate(-7deg) scale(1.07)} }
  .inner.chomp .jawO { animation: jawO2 .9s linear forwards; }
  .inner.chomp .jawC { animation: jawC2 .9s linear forwards; }
  @keyframes jawO2 { 0%,38%{opacity:1} 46%,56%{opacity:0} 64%,88%{opacity:1} 100%{opacity:0} }
  @keyframes jawC2 { 0%,38%{opacity:0} 46%,56%{opacity:1} 64%,88%{opacity:0} 100%{opacity:1} }
  .inner.breach { animation: breachA 1.6s ease; }
  @keyframes breachA { 0%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-55%) rotate(-14deg)} 55%{transform:translateY(-62%) rotate(-5deg)} 100%{transform:translateY(0) rotate(0)} }
  .inner.puffUp { animation: puffA 1.9s ease; }
  @keyframes puffA { 0%{transform:scale(1)} 18%{transform:scale(1.55)} 72%{transform:scale(1.55)} 100%{transform:scale(1)} }
  .spikes { opacity:0; transition:opacity .25s; }
  .inner.puffUp .spikes { opacity:1; }
  .inner.flap { animation: flapA .9s ease; }
  @keyframes flapA { 0%,100%{transform:scaleY(1)} 25%{transform:scaleY(.65)} 50%{transform:scaleY(1.2)} 75%{transform:scaleY(.8)} }
  .inner.snap { animation: snapA .7s ease; }
  @keyframes snapA { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-10deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(6deg)} }
  .tHead { transition:transform .35s ease; transform-box:fill-box; transform-origin:center; }
  .inner.shellHide .tHead { transform:translate(26px,2px) scale(.15); }
  .peekFish { opacity:0; transform:translateY(16px); transition:transform .4s ease, opacity .4s ease; transform-box:fill-box; }
  .inner.peek .peekFish { opacity:1; transform:translateY(-12px); }
  .clamTop { transition:transform .45s ease; transform-box:fill-box; transform-origin:90% 100%; }
  .inner.clamOpen .clamTop { transform:rotate(22deg); }
  #aqua .spout { opacity:0; transition:opacity .3s; }
  #aqua .spouting .spout { opacity:1; }
  #tankFx { position:absolute; inset:0; pointer-events:none; z-index:30; }
  .bubbleP { position:absolute; border:2px solid rgba(255,255,255,.75); background:rgba(255,255,255,.18);
    border-radius:50%; animation: bubbleRise linear forwards; }
  @keyframes bubbleRise { 0%{opacity:.9} 100%{ transform:translateY(-78vh) translateX(3vmin); opacity:0; } }
  .sparkP { position:absolute; animation: sparkPop .55s ease-out forwards; }
  .sparkP svg { width:100%; height:100%; }
  @keyframes sparkPop { from{transform:scale(.3); opacity:1} to{transform:scale(1.5); opacity:0} }
  .inkP { position:absolute; border-radius:50%; background:#403A55; opacity:.75; animation: inkSpread 1.5s ease-out forwards; }
  @keyframes inkSpread { to{ transform:scale(4.5); opacity:0; } }
  .dropP { position:absolute; width:1.8vmin; height:2.4vmin; background:#CFEAF8;
    border-radius:50% 50% 55% 55%; animation: dropArc .95s ease-out forwards; }
  @keyframes dropArc { 0%{opacity:1} 100%{ transform:translate(var(--dx), var(--dy)); opacity:0; } }
</style>
</head>
<body>

<div id="bgScenery"></div>

<!-- ============ HOME ============ -->
<section id="home" class="screen active">
  <div id="gameTitle">
    <h1>Animal Speak</h1>
    <div class="subtitle">Tap a world to play!</div>
  </div>
  <div id="worldDoors">
    <button class="door" id="door-safari"><span class="doorLabel">Safari</span></button>
    <button class="door" id="door-birds"><span class="doorLabel">Birds</span></button>
    <button class="door" id="door-aqua"><span class="doorLabel">Aquarium</span></button>
  </div>
  <button id="homeStickerBtn"><span id="homeStickerIcon"></span><span>Talk</span></button>
</section>

<!-- ============ BIRDS ============ -->
<section id="birdScene" class="screen">
  <div id="aviary">
    <div class="grassB"></div>
    <div class="grassB2"></div>
    <div id="aviaryDecor"></div>
    <div id="birdLayer"></div>
    <div id="birdFx"></div>
  </div>
  <div class="topbar">
    <button class="roundBtn" id="btnHomeB" aria-label="Home"></button>
    <div style="flex:1"></div>
    <button class="roundBtn" id="btnSoundB" aria-label="Sound on or off"></button>
  </div>
</section>

<!-- ============ STICKER BOOK ============ -->
<section id="stickers" class="screen">
  <div class="topbar">
    <button class="roundBtn" id="btnHome2" aria-label="Home"></button>
    <div id="stickerTitle">Let's Talk!</div>
    <div style="width:9.5vmin"></div>
  </div>
  <div id="stickerGrid"></div>
</section>

<!-- ============ SAFARI HIDE & SEEK ============ -->
<section id="safariScene" class="screen">
  <div id="savanna"></div>
  <div class="topbar">
    <button class="roundBtn" id="btnHomeS" aria-label="Home"></button>
    <div style="flex:1"></div>
    <button class="roundBtn" id="btnSoundS" aria-label="Sound on or off"></button>
  </div>
</section>

<!-- ============ AQUARIUM ============ -->
<section id="aqua" class="screen">
  <div id="tank">
    <div class="lightray" style="left:16%"></div>
    <div class="lightray" style="left:58%; animation-delay:3.5s; width:11vmin"></div>
    <div class="sand"></div>
    <div class="sand2"></div>
    <div id="tankDecor"></div>
    <div id="tankCreatures"></div>

function getCtx(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return null; }
  }
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, start, dur, vol, type){
  const ctx = getCtx(); if(!ctx) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  const t = ctx.currentTime + start;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function chimeTap()    { if(soundOn) tone(660, 0, 0.18, 0.10); }
function chimeWin()    { if(soundOn){ tone(523,0,.3,.13); tone(659,.13,.3,.13); tone(784,.26,.35,.13); tone(1047,.4,.5,.12); } }
function chimeBig()    { if(soundOn){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>tone(f, i*0.12, .4, .12)); } }
function chimeGentle() { if(soundOn) tone(330, 0, 0.25, 0.06); }

/* ============================================================
   SPEECH — names spoken aloud (no reading needed)
   ============================================================ */
function speak(text, slow){
  if(!soundOn || !('speechSynthesis' in window)) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = slow ? 0.8 : 0.9;
    u.pitch = 1.15;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && /Samantha|Karen|female/i.test(v.name)) ||
              voices.find(v => v.lang.startsWith('en'));
    if(v) u.voice = v;
    speechSynthesis.speak(u);
  } catch(e){}
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   SOUND EFFECTS — synthesized per-creature sounds
   ============================================================ */
let _noiseBuf = null;
function noiseBurst(start, dur, vol, freq, q){
  const ctx = getCtx(); if(!ctx || !soundOn) return;
  if(!_noiseBuf){
    _noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
    const d = _noiseBuf.getChannelData(0);
    for(let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  const src = ctx.createBufferSource(); src.buffer = _noiseBuf;
  const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = q || 1;
  const g = ctx.createGain(); const t = ctx.currentTime + start;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start(t); src.stop(t + dur + 0.05);
}
function glide(f1, f2, dur, vol, type, start){
  const ctx = getCtx(); if(!ctx || !soundOn) return;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type || 'sine';
  const t = ctx.currentTime + (start || 0);
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(f2, t + dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.05);
}

let aquaActive = false, swimmers = [], aquaLastTs = 0, spawnTimer = 0, bubbleTimer = 0;
let tankW = 0, tankH = 0, vminPx = 8;

function measureTank(){
  const r = $('tank').getBoundingClientRect();
  tankW = r.width || innerWidth; tankH = r.height || innerHeight;
  vminPx = Math.min(innerWidth, innerHeight) / 100;
}
function pickSpecies(){
  const counts = {};
  swimmers.forEach(s => counts[s.id] = (counts[s.id] || 0) + 1);
  const pool = Object.entries(AQUA_CFG).filter(([id, c]) => c.wt > 0 && (counts[id] || 0) < c.max);
  if(!pool.length) return null;
  const tot = pool.reduce((a, [,c]) => a + c.wt, 0);
  let r = Math.random() * tot;
  for(const [id, c] of pool){ r -= c.wt; if(r <= 0) return id; }
  return pool[0][0];
}
function spawnSwimmer(id, midway){
  const cfg = AQUA_CFG[id], size = cfg.w * vminPx;
  const el = document.createElement('div');
  el.className = 'swimmer';
  el.style.width = el.style.height = size + 'px';
  el.style.zIndex = Math.round(cfg.w);
  const inner = document.createElement('div');
  inner.className = 'inner' + (id === 'jellyfish' ? ' jelly' : '');
  inner.innerHTML = ART[id];
  el.appendChild(inner);
  const s = {
    id, cfg, el, inner, size,
    dir: Math.random() < .5 ? -1 : 1,
    x: 0, y: 0, baseY: 0, t: Math.random() * 10,
    speed: (cfg.spd[0] + Math.random() * (cfg.spd[1] - cfg.spd[0])) / 100,
    bobAmp: size * .06, bobFreq: .8 + Math.random() * .8,
    acting: false, paused: false, boost: 1
  };
  if(cfg.type === 'bottom'){
    s.y = tankH * cfg.band[0] - size * .55;
    s.x = Math.random() * (tankW - size);
  } else if(cfg.type === 'drift'){
    s.x = size + Math.random() * Math.max(50, tankW - 3 * size);
    s.driftX = s.x;
    s.y = tankH + size * .2;
  } else {
    s.y = tankH * (cfg.band[0] + Math.random() * (cfg.band[1] - cfg.band[0]));
    s.x = midway ? Math.random() * (tankW - size) : (s.dir < 0 ? tankW + size : -size * 1.5);
  }
  s.baseY = s.y;
  el.addEventListener('pointerdown', e => { e.preventDefault(); tapSwimmer(s); });
  $('tankCreatures').appendChild(el);
  swimmers.push(s);
  return s;
}
function removeSwimmer(i){ swimmers[i].el.remove(); swimmers.splice(i, 1); }

function aquaTick(ts){
  if(!aquaActive) return;
  requestAnimationFrame(aquaTick);
  const dt = Math.min((ts - aquaLastTs) / 1000, .06);
  aquaLastTs = ts;
  spawnTimer -= dt; bubbleTimer -= dt;
  if(spawnTimer <= 0 && swimmers.filter(x => x.cfg.type !== 'static').length < 9){
    const id = pickSpecies();
    if(id) spawnSwimmer(id, false);
    spawnTimer = 1.2 + Math.random() * 1.6;
  }
  if(bubbleTimer <= 0){ ambientBubble(); bubbleTimer = .6 + Math.random() * .9; }
  for(let i = swimmers.length - 1; i >= 0; i--){
    const s = swimmers[i];
    s.t += dt;
    if(!s.paused){
      if(s.cfg.type === 'drift'){
        s.y -= s.speed * tankH * dt * .6;
        s.x = s.driftX + Math.sin(s.t * .8) * s.size * .5;
        if(s.y < tankH * .14) s.el.style.opacity = Math.max(0, (s.y - tankH * .07) / (tankH * .07));
        if(s.y < tankH * .07){ removeSwimmer(i); continue; }
      } else if(s.cfg.type === 'bottom'){
        s.x += s.dir * s.speed * tankW * dt * s.boost;
        if(s.x < tankW * .03) s.dir = 1;
        if(s.x > tankW * .97 - s.size) s.dir = -1;
      } else if(s.cfg.type === 'swim'){
        s.x += s.dir * s.speed * tankW * dt * s.boost;
        if((s.dir < 0 && s.x < -s.size * 1.7) || (s.dir > 0 && s.x > tankW + s.size * 1.7)){
          removeSwimmer(i); continue;
        }
      }
    }
    const ry = s.cfg.type === 'swim' ? s.baseY + Math.sin(s.t * s.bobFreq) * s.bobAmp : s.y;
    const flip = (s.cfg.type === 'swim' && s.dir > 0) ? -1 : 1;
    s.el.style.transform = 'translate3d(' + s.x + 'px,' + ry + 'px,0) scaleX(' + flip + ')';
  }
}

function tapSwimmer(s){
  if(s.acting) return;
  s.acting = true;
  const c = CREATURES.find(c => c.id === s.id);
  const dur = s.cfg.act(s) || 1000;
  setTimeout(() => speak(c.say || c.name), 350);
  setTimeout(() => {
    s.acting = false;
    s.inner.classList.remove('spin','shockFlash','wiggle','chomp','puffUp','flap','snap','shellHide','spouting','breach','peek','clamOpen','pulseBig','hideIn','eelsDown','chestOpen');
  }, dur);
}

/* --- particles --- */
function bubbleAt(x, y, sz, durS){
  const b = document.createElement('div');
  b.className = 'bubbleP';
  b.style.width = b.style.height = sz + 'px';
  b.style.left = x + 'px'; b.style.top = y + 'px';
  b.style.animationDuration = durS + 's';
  $('tankFx').appendChild(b);
  setTimeout(() => b.remove(), durS * 1000);
}
function ambientBubble(){ bubbleAt(Math.random() * tankW, tankH * (.85 + Math.random() * .1), 6 + Math.random() * 14, 4 + Math.random() * 3); }
function bubbleTrail(s){ for(let i=0;i<5;i++) setTimeout(() => bubbleAt(s.x + s.size*.5, s.baseY + s.size*.4, 5 + Math.random()*8, 2.5), i*140); }
function mouthBubbles(s){ const mx = s.dir > 0 ? s.size*.85 : s.size*.05; for(let i=0;i<5;i++) setTimeout(() => bubbleAt(s.x + mx, s.baseY + s.size*.45, 4 + Math.random()*7, 2.2), i*120); }
function sparkBurst(s, n){
  for(let i = 0; i < n; i++){
    const d = document.createElement('div');
    d.className = 'sparkP';
    const sz = s.size * .35;
    d.style.width = d.style.height = sz + 'px';
    d.style.left = (s.x + Math.random() * s.size * .8) + 'px';
    d.style.top = (s.y + Math.random() * s.size * .7 - s.size * .1) + 'px';

}
function inkCloud(s){

function spoutDrops(s){

function onTankTap(e){
  if(e.target !== $('tank')) return;
  const r = $('tank').getBoundingClientRect();
  bubbleAt(e.clientX - r.left, e.clientY - r.top, 8 + Math.random() * 10, 3);
  chimeGentle();
}

const SAFARI_SOUNDS = {
  lion: sfxRoar, elephant: sfxTrumpet, giraffe: sfxHumG, zebra: sfxBray, hippo: sfxGruntH,

let safariTotal = 0, safariFound = 0;
function startSafari(){
  currentWorld = null;
  stopAqua();
  document.body.className = 'world-safariS' + (Math.random() < .4 ? ' gold' : '');
  $('bgScenery').innerHTML = '';
  showScreen('safariScene');
  chimeTap();
  speak('Welcome to the safari! Find the animals!');

}
function buildSafariScene(){
  const sc = $('savanna');
  safariFound = 0;
  const gold = document.body.className.indexOf('gold') >= 0;
  let html = '';
  html += `<svg class="skyItem" viewBox="0 0 100 100" style="left:${8 + Math.random() * 72}%;top:4%;width:13vmin;height:13vmin"><circle cx="50" cy="50" r="30" fill="${gold ? '#FFB54A' : '#FFD95C'}"/></svg>`;
  const nClouds = 2 + Math.floor(Math.random() * 2);
  for(let i = 0; i < nClouds; i++){
    const cw = 14 + Math.random() * 10;
    html += `<svg class="skyItem float-slow" viewBox="0 0 120 60" style="left:${Math.random() * 75}%;top:${3 + Math.random() * 14}%;width:${cw}vmin;height:${cw / 2}vmin"><ellipse cx="40" cy="40" rx="28" ry="16" fill="#FFF" opacity=".9"/><ellipse cx="68" cy="32" rx="24" ry="15" fill="#FFF" opacity=".9"/><ellipse cx="92" cy="42" rx="20" ry="12" fill="#FFF" opacity=".9"/></svg>`;
  }
  html += '<div class="ground2"></div><div class="ground"></div>';
  for(let i = 0; i < 6; i++){
    html += `<svg class="skyItem" viewBox="0 0 60 40" style="left:${Math.random() * 90}%;bottom:${6 + Math.random() * 22}%;width:5vmin;height:3.4vmin"><path d="M30 40 Q26 20 18 12 M30 40 Q30 16 30 8 M30 40 Q34 20 42 12" stroke="#8FA85A" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`;
  }
  sc.innerHTML = html;
  const hasRiver = Math.random() < .7;
  if(hasRiver){
    const rb = document.createElement('div');
    rb.className = 'riverBand';
    let ripples = '';
    for(let i = 0; i < 3; i++) ripples += `<svg viewBox="0 0 100 20" style="position:absolute;left:${5 + Math.random() * 80}%;top:${15 + Math.random() * 50}%;width:13vmin;height:2.6vmin"><path d="M4 10 q11 -8 24 0 q12 8 24 0 q12 -8 24 0" stroke="rgba(255,255,255,.55)" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
    rb.innerHTML = ripples;
    sc.appendChild(rb);
  }
  const landX = shuffle([3, 19, 36, 53, 69, 83]).slice(0, 5);
  const types = ['tree', 'bush', 'rock'];
  const landPool = shuffle(['lion','elephant','giraffe','zebra','monkey','rhino'].concat(hasRiver ? [] : ['hippo']));
  const landAnimals = landPool.slice(0, 4);
  const waterAnimals = hasRiver ? shuffle(['crocodile','hippo','flamingo']).slice(0, 2) : [];
  safariTotal = landAnimals.length + waterAnimals.length;
  const landAssign = shuffle(landAnimals.concat([null]));
  landX.forEach((x, i) => makeSpot(sc, {
    x, type: types[Math.floor(Math.random() * 3)],
    animal: landAssign[i],
    bottom: hasRiver ? 13 + Math.random() * 14 : 6 + Math.random() * 18,
    water: false
  }));
  if(hasRiver){
    shuffle([12, 42, 72]).slice(0, 2).forEach((x, i) =>
      makeSpot(sc, { x, type: 'water', animal: waterAnimals[i] || null, bottom: .5 + Math.random() * 3, water: true }));
  }
}
function makeSpot(sc, o){
  const dims = { tree: [22, 26.4], bush: [17, 13.6], rock: [15, 10.5], water: [21, 11.6] };
  const sca = .85 + Math.random() * .35;
  const spot = document.createElement('div');
  spot.className = 'spot';
  spot.style.left = o.x + '%';
  spot.style.bottom = o.bottom + '%';
  spot.style.width = (dims[o.type][0] * sca) + 'vmin';
  spot.style.height = (dims[o.type][1] * sca) + 'vmin';
  spot.style.zIndex = Math.round(60 - o.bottom);
  const animalEl = document.createElement('div');
  animalEl.className = 'animalEl';
  if(o.animal) animalEl.innerHTML = FULLART[o.animal] || ART[o.animal];
  const obEl = document.createElement('div');
  obEl.className = 'obstacleEl';
  obEl.innerHTML = OBSTACLES[o.type];
  spot.appendChild(animalEl);
  spot.appendChild(obEl);
  const st = { spot, obEl, animal: o.animal, water: o.water, done: false, flew: false };
  obEl.addEventListener('pointerdown', e => { e.preventDefault(); tapSpot(st); });
  sc.appendChild(spot);
}
function tapSpot(st){
  st.obEl.classList.remove('rustle'); void st.obEl.offsetWidth; st.obEl.classList.add('rustle');
  if(st.water){ sfxSplash(); splashAt(st.spot); } else { sfxRustle(); leavesAt(st.spot); }
  if(st.done) return;
  if(st.animal){
    st.done = true;
    st.spot.classList.add('revealed');
    sfxPopUp();
    const c = CREATURES.find(c => c.id === st.animal);
    setTimeout(() => speak(c.name + '!'), 250);
    setTimeout(() => { if(SAFARI_SOUNDS[st.animal]) SAFARI_SOUNDS[st.animal](); }, 1100);
    setTimeout(() => burstStars(st.spot), 350);
    safariFound++;
    if(safariFound >= safariTotal){
      setTimeout(() => { chimeBig(); showRainbow(); speak('You found them all!'); }, 2300);
      setTimeout(buildSafariScene, 5500);
    }
  } else if(!st.flew){
    st.flew = true;
    const b = document.createElement('div');
    b.className = 'butterflyP';
    b.style.left = '40%'; b.style.top = '10%';
    b.innerHTML = BUTTERFLY;
    st.spot.appendChild(b);
    setTimeout(() => b.remove(), 2500);
  }
}
function leavesAt(spot){
  for(let i = 0; i < 6; i++){
    const l = document.createElement('div');
    l.className = 'leafP';
    l.style.left = (25 + Math.random() * 50) + '%';
    l.style.top = (15 + Math.random() * 40) + '%';
    l.style.setProperty('--dx', (Math.random() * 16 - 8) + 'vmin');
    l.style.setProperty('--dy', (-(2 + Math.random() * 8)) + 'vmin');
    spot.appendChild(l);
    setTimeout(() => l.remove(), 1000);
  }
}
function splashAt(spot){
  for(let i = 0; i < 6; i++){
    const d = document.createElement('div');
    d.className = 'dropP';
    d.style.left = (30 + Math.random() * 40) + '%';
    d.style.top = '30%';
    d.style.setProperty('--dx', (Math.random() * 12 - 6) + 'vmin');
    d.style.setProperty('--dy', (-(4 + Math.random() * 6)) + 'vmin');
    spot.appendChild(d);
    setTimeout(() => d.remove(), 1100);
  }
}

   ============================================================ */
const BIRD_CFG = {
  cardinal:   { w:13, band:[.14,.45], spd:[ 7,11], type:'fly',    act:actSing,  max:2, wt:2.5 },
  goose:      { w:27, band:[.10,.34], spd:[ 5, 8], type:'fly',    act:actHonkG, max:2, wt:1.5 },
  eagle:      { w:30, band:[.07,.26], spd:[ 6, 9], type:'fly',    act:actSoar,  max:1, wt:1.2 },
  toucan:     { w:18, band:[.16,.42], spd:[ 5, 8], type:'fly',    act:actClack, max:1, wt:1.2 },
  parrot:     { w:18, band:[.14,.40], spd:[ 6, 9], type:'fly',    act:actHello, max:1, wt:1.2 },
  hummingbird:{ w:10, band:[.28,.55], spd:[ 0, 0], type:'hover',  act:actZip,   max:2, wt:2   },
  bluejay:    { w:14, band:[.14,.45], spd:[ 7,10], type:'fly',    act:actJay,   max:2, wt:2   },
  crow:       { w:16, band:[.10,.38], spd:[ 6, 9], type:'fly',    act:actCaw,   max:2, wt:1.5 },
  seagull:    { w:17, band:[.08,.32], spd:[ 6, 9], type:'fly',    act:actGull,  max:2, wt:1.5 },
  chicken:    { w:16, band:[.84,.84], spd:[ 3, 5], type:'ground', act:actEgg,   max:2, wt:2   },
  duck:       { w:15, band:[.86,.86], spd:[ 3, 5], type:'ground', act:actQuack, max:2, wt:2   },
  ibis:       { w:18, band:[.85,.85], spd:[2.5,4], type:'ground', act:actProbe, max:1, wt:1.5 },
  heron:      { w:26, band:[0,0],     spd:[0,0],   type:'static', act:actSpear, max:1, wt:0   },
  owl:        { w:15, band:[0,0],     spd:[0,0],   type:'static', act:actHoo,   max:1, wt:0   },
  woodpecker: { w:13, band:[0,0],     spd:[0,0],   type:'static', act:actDrum,  max:1, wt:0   }
};
let birdsActive = false, birds = [], birdLastTs = 0, birdSpawnT = 0;
let avW = 0, avH = 0;

function measureAviary(){
  const r = $('aviary').getBoundingClientRect();
  avW = r.width || innerWidth; avH = r.height || innerHeight;
  vminPx = Math.min(innerWidth, innerHeight) / 100;
}
function pickBirdSpecies(){
  const counts = {};
  birds.forEach(b => counts[b.id] = (counts[b.id] || 0) + 1);
  const pool = Object.entries(BIRD_CFG).filter(([id, c]) => c.wt > 0 && (counts[id] || 0) < c.max);
  if(!pool.length) return null;
  const tot = pool.reduce((a, [,c]) => a + c.wt, 0);
  let r = Math.random() * tot;
  for(const [id, c] of pool){ r -= c.wt; if(r <= 0) return id; }
  return pool[0][0];
}
function spawnBird(id, midway){
  const cfg = BIRD_CFG[id], size = cfg.w * vminPx;
  const el = document.createElement('div');
  el.className = 'birdEl';
  el.style.width = el.style.height = size + 'px';
  el.style.zIndex = Math.round(cfg.w);
  const inner = document.createElement('div');
  inner.className = 'inner';
  inner.innerHTML = ART[id];
  el.appendChild(inner);
  const b = {
    id, cfg, el, inner, size,
    dir: Math.random() < .5 ? -1 : 1,
    x: 0, y: 0, baseY: 0, t: Math.random() * 10,
    speed: (cfg.spd[0] + Math.random() * (cfg.spd[1] - cfg.spd[0])) / 100,
    bobAmp: size * .07, bobFreq: 1 + Math.random(),
    acting: false, paused: false, boost: 1,
    tx: 0, retarget: 0
  };
  if(cfg.type === 'ground'){
    b.y = avH * .96 - size;
    b.x = Math.random() * (avW - size);
  } else if(cfg.type === 'hover'){
    b.y = avH * (cfg.band[0] + Math.random() * (cfg.band[1] - cfg.band[0]));
    b.x = Math.random() * (avW - size);
    b.tx = Math.random() * (avW - size);
    b.retarget = 2 + Math.random() * 2;
  } else {
    b.y = avH * (cfg.band[0] + Math.random() * (cfg.band[1] - cfg.band[0]));
    b.x = midway ? Math.random() * (avW - size) : (b.dir < 0 ? avW + size : -size * 1.5);
  }
  b.baseY = b.y;
  el.addEventListener('pointerdown', e => { e.preventDefault(); tapBird(b); });
  $('birdLayer').appendChild(el);
  birds.push(b);
  return b;
}
function removeBird(i){ birds[i].el.remove(); birds.splice(i, 1); }

function birdTick(ts){
  if(!birdsActive) return;
  requestAnimationFrame(birdTick);
  const dt = Math.min((ts - birdLastTs) / 1000, .06);
  birdLastTs = ts;
  birdSpawnT -= dt;
  if(birdSpawnT <= 0 && birds.filter(x => x.cfg.type !== 'static').length < 8){
    const id = pickBirdSpecies();
    if(id) spawnBird(id, false);
    birdSpawnT = 1.3 + Math.random() * 1.8;
  }
  for(let i = birds.length - 1; i >= 0; i--){
    const b = birds[i];
    b.t += dt;
    let flip = (b.cfg.type === 'fly' && b.dir > 0) ? -1 : 1;
    if(!b.paused){
      if(b.cfg.type === 'fly'){
        b.x += b.dir * b.speed * avW * dt * b.boost;
        if((b.dir < 0 && b.x < -b.size * 1.7) || (b.dir > 0 && b.x > avW + b.size * 1.7)){
          removeBird(i); continue;
        }
      } else if(b.cfg.type === 'ground'){
        b.x += b.dir * b.speed * avW * dt * .5 * b.boost;
        if(b.x < avW * .02) b.dir = 1;
        if(b.x > avW * .98 - b.size) b.dir = -1;
        flip = b.dir > 0 ? -1 : 1;
      } else if(b.cfg.type === 'hover'){
        b.retarget -= dt;
        if(b.retarget <= 0){ b.tx = Math.random() * (avW - b.size); b.retarget = 2 + Math.random() * 2; }
        flip = (b.tx > b.x) ? -1 : 1;
        b.x += (b.tx - b.x) * Math.min(1, dt * 2.2);
      }
    }
    let ry = b.y;
    if(b.cfg.type === 'fly') ry = b.baseY + Math.sin(b.t * b.bobFreq) * b.bobAmp;
    if(b.cfg.type === 'hover') ry = b.baseY + Math.sin(b.t * 5) * b.size * .12;
    if(b.cfg.type === 'ground' && !b.paused) ry = b.baseY - Math.abs(Math.sin(b.t * 5)) * b.size * .05;
    b.el.style.transform = 'translate3d(' + b.x + 'px,' + ry + 'px,0) scaleX(' + flip + ')';
  }
}

function tapBird(b){
  if(b.acting) return;
  b.acting = true;
  const c = CREATURES.find(c => c.id === b.id);
  const dur = b.cfg.act(b) || 1000;
  setTimeout(() => speak(c.say || c.name), 350);
  setTimeout(() => {
    b.acting = false;
    b.inner.classList.remove('soar','hopB','peck','drum','hoo','wiggle');
  }, dur);
}

/* --- bird voices (synth) --- */
function sfxEagle()    { glide(1900, 700, .6, .08, 'sine'); glide(1700, 650, .55, .07, 'sine', .7); }
function sfxChicken()  { if(!soundOn) return; tone(310, 0, .1, .09, 'square'); tone(310, .18, .1, .09, 'square'); tone(300, .36, .08, .09, 'square'); glide(330, 560, .28, .10, 'square', .5); }
function sfxHonkGoose(){ glide(230, 170, .25, .11, 'sawtooth'); glide(230, 165, .3, .11, 'sawtooth', .35); }
function sfxCardinal() { if(!soundOn) return; for(let i=0;i<3;i++) glide(1250, 1900, .14, .08, 'sine', i*.2); glide(1900, 1250, .3, .07, 'sine', .65); }
function sfxHumWings() { if(!soundOn) return; for(let i=0;i<10;i++) tone(150+Math.random()*40, i*.05, .05, .04, 'sawtooth'); glide(1400, 2000, .12, .05, 'sine', .3); }
function sfxHeronCk()  { glide(140, 90, .3, .11, 'sawtooth'); noiseBurst(0, .25, .05, 300, 1); }
function sfxIbisG()    { tone(230, 0, .12, .09); tone(210, .18, .12, .09); }
function sfxOwlHoo()   { glide(340, 300, .3, .10, 'sine'); glide(330, 290, .4, .10, 'sine', .45); }
function sfxQuack()    { glide(300, 190, .16, .10, 'sawtooth'); glide(300, 185, .18, .10, 'sawtooth', .25); }
function sfxToucanC()  { tone(950, 0, .05, .10, 'square'); tone(900, .12, .05, .10, 'square'); glide(250, 180, .25, .09, 'square', .25); }
function sfxSquawk()   { glide(800, 1200, .12, .08, 'sawtooth'); glide(1200, 700, .15, .08, 'sawtooth', .13); }
function sfxJay()      { glide(1600, 950, .16, .07, 'sawtooth'); glide(1600, 900, .18, .07, 'sawtooth', .22); }
function sfxCaw()      { glide(420, 290, .22, .10, 'sawtooth'); noiseBurst(0, .2, .04, 500, 1); glide(420, 280, .24, .10, 'sawtooth', .32); }
function sfxGull()     { glide(900, 1400, .22, .08, 'sine'); glide(1400, 850, .28, .08, 'sine', .25); glide(950, 1350, .2, .07, 'sine', .6); }
function sfxDrumWood() { if(!soundOn) return; for(let i=0;i<8;i++) tone(190, i*.07, .035, .10, 'square'); }

/* --- bird tricks --- */
function actSoar(b){ b.inner.classList.add('soar'); sfxEagle(); b.boost = 2.4; setTimeout(() => b.boost = 1, 1200); return 1500; }
function actEgg(b){
  b.inner.classList.add('wiggle');
  sfxChicken();
  const e = document.createElement('div');
  e.className = 'eggP';
  e.style.left = (b.x + b.size * .55) + 'px';
  e.style.top = (b.y + b.size * .72) + 'px';
  $('birdFx').appendChild(e);
  setTimeout(() => e.remove(), 2700);
  return 1400;
}
function actHonkG(b){ b.inner.classList.add('wiggle'); sfxHonkGoose(); b.boost = 2; setTimeout(() => b.boost = 1, 800); return 950; }
function actSing(b){ b.inner.classList.add('hopB'); sfxCardinal(); musicNotes(b); return 1150; }
function actZip(b){
  sfxHumWings();
  const jump = () => { b.tx = Math.random() * (avW - b.size); };
  jump(); setTimeout(jump, 260); setTimeout(jump, 520);
  return 950;
}
function actSpear(b){ b.inner.classList.add('peck'); sfxHeronCk(); pondSplash(b); setTimeout(() => fishCatch(b), 420); return 1400; }
function fishCatch(b){
  const f = document.createElement('div');
  f.className = 'fishP';
  f.style.width = '5vmin'; f.style.height = '2.5vmin';
  f.style.left = (b.x + b.size * .02) + 'px';
  f.style.top = (b.y + b.size * .30) + 'px';
  f.innerHTML = FISH_SVG;
  $('birdFx').appendChild(f);
  setTimeout(() => f.remove(), 1400);
}
function actProbe(b){ b.inner.classList.add('peck'); sfxIbisG(); dirtPuff(b); return 1000; }
function actHoo(b){ b.inner.classList.add('hoo'); sfxOwlHoo(); return 1300; }
function actQuack(b){ b.inner.classList.add('wiggle'); sfxQuack(); return 900; }
function actClack(b){ b.inner.classList.add('peck'); sfxToucanC(); return 1000; }
function actHello(b){ b.inner.classList.add('hopB'); sfxSquawk(); setTimeout(() => speak('Hello! Hello!'), 1300); return 2400; }
function actDrum(b){ b.inner.classList.add('drum'); sfxDrumWood(); woodChips(b); return 1200; }
function actJay(b){ b.inner.classList.add('hopB'); sfxJay(); musicNotes(b); return 1100; }
function actCaw(b){ b.inner.classList.add('wiggle'); sfxCaw(); return 1000; }
function actGull(b){ b.inner.classList.add('soar'); sfxGull(); b.boost = 1.8; setTimeout(() => b.boost = 1, 1000); return 1300; }

/* --- bird particles --- */
function musicNotes(b){
  for(let i = 0; i < 3; i++){
    const n = document.createElement('div');
    n.className = 'noteP';
    const sz = b.size * .45;
    n.style.width = n.style.height = sz + 'px';
    n.style.left = (b.x + b.size * .3) + 'px';
    n.style.top = (b.y - b.size * .2) + 'px';
    n.style.setProperty('--dx', ((i - 1) * 4) + 'vmin');
    n.style.animationDelay = (i * .18) + 's';
    n.innerHTML = NOTE_SVG;
    $('birdFx').appendChild(n);
    setTimeout(() => n.remove(), 1800);
  }
}
function pondSplash(b){
  for(let i = 0; i < 5; i++){
    const d = document.createElement('div');
    d.className = 'dropP';
    d.style.left = (b.x + b.size * .15) + 'px';
    d.style.top = (b.y + b.size * .75) + 'px';
    d.style.setProperty('--dx', ((Math.random() * 8 - 4) * vminPx) + 'px');
    d.style.setProperty('--dy', (-(2 + Math.random() * 4) * vminPx) + 'px');
    $('birdFx').appendChild(d);
    setTimeout(() => d.remove(), 1100);
  }
}
function dirtPuff(b){
  for(let i = 0; i < 6; i++){
    const l = document.createElement('div');
    l.className = 'chipP';
    l.style.background = '#B58A5A';
    l.style.left = (b.x + b.size * .15) + 'px';
    l.style.top = (b.y + b.size * .8) + 'px';
    l.style.setProperty('--dx', ((Math.random() * 8 - 4)) + 'vmin');
    l.style.setProperty('--dy', (-(1 + Math.random() * 3)) + 'vmin');
    $('birdFx').appendChild(l);
    setTimeout(() => l.remove(), 900);
  }
}
function woodChips(b){
  for(let i = 0; i < 6; i++){
    const l = document.createElement('div');
    l.className = 'chipP';
    l.style.left = (b.x + b.size * .2) + 'px';
    l.style.top = (b.y + b.size * .5) + 'px';
    l.style.setProperty('--dx', ((Math.random() * 10 - 7)) + 'vmin');
    l.style.setProperty('--dy', ((Math.random() * 6 - 3)) + 'vmin');
    $('birdFx').appendChild(l);
    setTimeout(() => l.remove(), 900);
  }
}
function featherDrop(x, y){
  const f = document.createElement('div');
  f.className = 'featherP';
  f.style.width = '4.5vmin'; f.style.height = '6.5vmin';
  f.style.left = x + 'px'; f.style.top = y + 'px';
  f.innerHTML = FEATHER_SVG;
  $('birdFx').appendChild(f);
  setTimeout(() => f.remove(), 3400);
}

    <svg viewBox="0 0 40 50" style="left:45%; bottom:13%; width:3.5vmin; height:4.4vmin"><path d="M20 50 V22" stroke="#5E8C3E" stroke-width="3"/><circle cx="20" cy="14" r="9" fill="#F2C14E"/><circle cx="20" cy="14" r="4" fill="#C98A1B"/></svg>
    <svg viewBox="0 0 40 50" style="left:12%; bottom:15%; width:3.5vmin; height:4.4vmin"><path d="M20 50 V22" stroke="#5E8C3E" stroke-width="3"/><circle cx="20" cy="14" r="9" fill="#E86A8A"/><circle cx="20" cy="14" r="4" fill="#B5345E"/></svg>`;
}
function startBirds(){
  currentWorld = null;
  stopAqua();
  document.body.className = 'world-birds';
  $('bgScenery').innerHTML = '';
  showScreen('birdScene');
  chimeTap();
  speak('Welcome to the birds!');
  measureAviary();
  buildAviary();
  $('birdLayer').innerHTML = '';
  $('birdFx').innerHTML = '';
  birds = [];
  const treeX = avW * .64, treeW = 36 * vminPx, treeBottom = avH * .91, treeH = 46 * vminPx;
  const he = spawnBird('heron', true);
  he.x = 4 * vminPx;
  he.y = he.baseY = avH * .94 - 5 * vminPx - he.size * .88;
  const ow = spawnBird('owl', true);
  ow.x = treeX + treeW * .5 - ow.size * .5;
  ow.y = ow.baseY = treeBottom - treeH + treeH * .26 - ow.size * .5;
  const wp = spawnBird('woodpecker', true);
  wp.x = treeX + treeW * .57 - wp.size * .5;
  wp.y = wp.baseY = treeBottom - treeH * .45;
  for(let i = 0; i < 4; i++){
    const id = pickBirdSpecies();
    if(id) spawnBird(id, true);
  }
  birdSpawnT = 1.5;
  birdsActive = true;
  birdLastTs = performance.now();
  requestAnimationFrame(birdTick);
}
function stopBirds(){
  birdsActive = false;
  birds = [];
  if($('birdLayer')) $('birdLayer').innerHTML = '';
  if($('birdFx')) $('birdFx').innerHTML = '';
}
function onSkyTap(e){
  if(e.target !== $('aviary')) return;
  const r = $('aviary').getBoundingClientRect();
  featherDrop(e.clientX - r.left, e.clientY - r.top);
  chimeGentle();
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  // world doors: creature icon above label
  $('door-safari').insertAdjacentHTML('afterbegin', ART.lion);
  $('door-safari').addEventListener('click', startSafari);
  $('door-birds').insertAdjacentHTML('afterbegin', ART.cardinal);
  $('door-birds').addEventListener('click', startBirds);
  $('btnHomeB').innerHTML = ICONS.home;
  $('btnSoundB').innerHTML = ICONS.soundOn;
  $('btnHomeB').addEventListener('click', () => { chimeTap(); goHome(); });
  $('btnSoundB').addEventListener('click', toggleSound);
  $('aviary').addEventListener('pointerdown', onSkyTap);
  $('btnHomeS').innerHTML = ICONS.home;
  $('btnSoundS').innerHTML = ICONS.soundOn;
  $('btnHomeS').addEventListener('click', () => { chimeTap(); goHome(); });
  $('btnSoundS').addEventListener('click', toggleSound);
  $('homeStickerIcon').innerHTML = ICONS.talk;
  $('homeStickerIcon').firstChild.style.width = '5vmin';
  $('homeStickerIcon').firstChild.style.height = '5vmin';
  $('btnHome2').innerHTML = ICONS.home;

  const aquaDoor = $('door-aqua');
  aquaDoor.insertAdjacentHTML('afterbegin', ART.jellyfish);
  aquaDoor.addEventListener('click', startAqua);
  $('btnHomeA').innerHTML = ICONS.home;
  $('btnSoundA').innerHTML = ICONS.soundOn;
  $('btnHomeA').addEventListener('click', () => { chimeTap(); goHome(); });
  $('btnSoundA').addEventListener('click', toggleSound);
  $('tank').addEventListener('pointerdown', onTankTap);
  window.addEventListener('resize', () => { if(aquaActive) measureTank(); });

  $('btnHome2').addEventListener('click', () => { chimeTap(); goHome(); });
  $('homeStickerBtn').addEventListener('click', openTalk);

  setScenery('home');
}
document.addEventListener('DOMContentLoaded', init);
